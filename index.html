<!doctype html>
<html lang="pt-BR" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ART Obra Pro - Bragion Projetos</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Playfair+Display:wght@700;800&amp;display=swap" rel="stylesheet">
  <script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        brand: { 50:'#fef7ed', 100:'#fdecd4', 200:'#f9d5a8', 300:'#f4b76f', 400:'#ee8f35', 500:'#ea7512', 600:'#d05c08', 700:'#ac4309', 800:'#893610', 900:'#742f10' },
        slate: { 850:'#172033', 900:'#0f172a', 950:'#080d1a' }
      }
    }
  }
}
</script>
  <style>
html, body { height: 100%; margin: 0; font-family: 'DM Sans', sans-serif; }
.font-display { font-family: 'Playfair Display', serif; }
.sidebar-link { transition: all 0.2s; }
.sidebar-link:hover, .sidebar-link.active { background: rgba(234,117,18,0.12); color: #ea7512; }
.card-hover { transition: transform 0.2s, box-shadow 0.2s; }
.card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
.fade-in { animation: fadeIn 0.3s ease-out; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.status-badge { padding: 2px 10px; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
input:focus, select:focus, textarea:focus { outline: none; border-color: #ea7512; box-shadow: 0 0 0 3px rgba(234,117,18,0.15); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
.toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; padding: 12px 20px; border-radius: 8px; color: #fff; font-weight: 500; animation: slideUp 0.3s ease-out; }
@keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.mobile-overlay { display:none; }
@media(max-width:1023px) { .mobile-overlay.open { display:block; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:40; } }
</style>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full bg-slate-950 text-slate-200 overflow-hidden">
  <div id="app" class="h-full flex"><!-- Mobile Overlay -->
   <div id="mobileOverlay" class="mobile-overlay" onclick="toggleSidebar()"></div><!-- Sidebar -->
   <aside id="sidebar" class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col h-full flex-shrink-0 fixed lg:relative z-50 -translate-x-full lg:translate-x-0 transition-transform">
    <div class="p-5 border-b border-slate-800">
     <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-brand-500 rounded-lg flex items-center justify-center"><i data-lucide="hard-hat" class="w-5 h-5 text-white"></i>
      </div>
      <div>
       <div id="sidebarTitle" class="font-display text-lg text-white leading-tight">
        ART Obra Pro
       </div>
       <div id="sidebarBrand" class="text-[11px] text-brand-400 font-medium tracking-wide">
        BRAGION PROJETOS
       </div>
      </div>
     </div>
    </div>
    <nav class="flex-1 p-3 space-y-1 overflow-auto"><button onclick="navigate('dashboard')" class="sidebar-link active w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium" data-nav="dashboard"> <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard </button> <button onclick="navigate('works')" class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400" data-nav="works"> <i data-lucide="building-2" class="w-4 h-4"></i> Obras </button> <button onclick="navigate('clients')" class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400" data-nav="clients"> <i data-lucide="users" class="w-4 h-4"></i> Clientes </button> <button onclick="navigate('arts')" class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400" data-nav="arts"> <i data-lucide="file-text" class="w-4 h-4"></i> ARTs </button> <button onclick="navigate('new-art')" class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400" data-nav="new-art"> <i data-lucide="plus-circle" class="w-4 h-4"></i> Nova ART </button> <button onclick="navigate('reports')" class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400" data-nav="reports"> <i data-lucide="bar-chart-3" class="w-4 h-4"></i> Relatórios </button>
    </nav>
    <div class="p-3 border-t border-slate-800">
     <div class="flex items-center gap-3 px-3 py-2">
      <div class="w-8 h-8 rounded-full bg-brand-600 flex items-center justify-center text-white text-xs font-bold">
       BP
      </div>
      <div class="flex-1 min-w-0">
       <div class="text-sm font-medium text-white truncate">
        Eng. Bragion
       </div>
       <div class="text-[11px] text-slate-500">
        Administrador
       </div>
      </div>
     </div>
    </div>
   </aside><!-- Main Content -->
   <main class="flex-1 h-full overflow-auto"><!-- Top Bar -->
    <header class="sticky top-0 z-30 bg-slate-950/80 backdrop-blur-lg border-b border-slate-800/50 px-4 lg:px-6 py-3 flex items-center justify-between">
     <div class="flex items-center gap-3"><button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg hover:bg-slate-800 text-slate-400"><i data-lucide="menu" class="w-5 h-5"></i></button>
      <h1 id="pageTitle" class="text-lg font-semibold text-white">Painel de Controle</h1>
     </div>
     <div class="flex items-center gap-2"><button onclick="navigate('new-art')" class="hidden sm:flex items-center gap-2 bg-brand-500 hover:bg-brand-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors"> <i data-lucide="plus" class="w-4 h-4"></i> Nova ART </button> <button class="p-2 rounded-lg hover:bg-slate-800 text-slate-400 relative"> <i data-lucide="bell" class="w-5 h-5"></i> <span id="notifBadge" class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-red-500 rounded-full text-[10px] text-white flex items-center justify-center font-bold hidden">0</span> </button>
     </div>
    </header><!-- Page Content Container -->
    <div id="pageContent" class="p-4 lg:p-6 fade-in"><!-- Dashboard loaded by default -->
    </div>
   </main>
  </div><!-- Toast Container -->
  <div id="toastContainer"></div><!-- Inline Confirm Modal -->
  <div id="confirmModal" class="fixed inset-0 z-[9999] hidden items-center justify-center bg-black/60 backdrop-blur-sm" style="display:none;">
   <div class="bg-slate-800 border border-slate-700 rounded-xl p-6 max-w-sm w-full mx-4 shadow-2xl">
    <p id="confirmMsg" class="text-white text-sm mb-4"></p>
    <div class="flex gap-3 justify-end"><button onclick="closeConfirm()" class="px-4 py-2 rounded-lg text-sm text-slate-400 hover:bg-slate-700 transition-colors">Cancelar</button> <button id="confirmBtn" class="px-4 py-2 rounded-lg text-sm bg-red-500 hover:bg-red-600 text-white font-medium transition-colors">Confirmar</button>
    </div>
   </div>
  </div>
  <script>
// ============ STATE ============
let allData = [];
let currentPage = 'dashboard';
let editingId = null;
let confirmCallback = null;

const defaultConfig = {
  app_title: 'ART Obra Pro',
  company_brand: 'Bragion Projetos',
  dashboard_greeting: 'Painel de Controle',
  background_color: '#080d1a',
  surface_color: '#0f172a',
  text_color: '#e2e8f0',
  primary_action_color: '#ea7512',
  secondary_action_color: '#64748b',
  font_family: 'DM Sans',
  font_size: 14
};

// ============ HELPERS ============
function getByType(t) { return allData.filter(r => r.type === t); }
function getArts() { return getByType('art'); }
function getClients() { return getByType('client'); }
function getWorks() { return getByType('work'); }
function nextArtNumber() { const arts = getArts(); return 'ART-' + String(arts.length + 1).padStart(4, '0'); }
function formatCurrency(v) { return 'R$ ' + Number(v||0).toLocaleString('pt-BR', {minimumFractionDigits:2}); }
function formatDate(d) { if(!d) return '-'; const dt = new Date(d); return dt.toLocaleDateString('pt-BR'); }
function statusColor(s) {
  const m = { rascunho:'bg-yellow-500/20 text-yellow-400', pendente:'bg-blue-500/20 text-blue-400', emitida:'bg-emerald-500/20 text-emerald-400', cancelada:'bg-red-500/20 text-red-400', arquivada:'bg-slate-500/20 text-slate-400' };
  return m[s] || m.rascunho;
}
function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast ${type==='error'?'bg-red-600':'bg-emerald-600'}`;
  t.textContent = msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
function showConfirm(msg, cb) {
  document.getElementById('confirmMsg').textContent = msg;
  document.getElementById('confirmModal').style.display = 'flex';
  confirmCallback = cb;
  document.getElementById('confirmBtn').onclick = () => { closeConfirm(); if(confirmCallback) confirmCallback(); };
}
function closeConfirm() { document.getElementById('confirmModal').style.display = 'none'; confirmCallback = null; }

function toggleSidebar() {
  const s = document.getElementById('sidebar');
  const o = document.getElementById('mobileOverlay');
  s.classList.toggle('-translate-x-full');
  o.classList.toggle('open');
}

// ============ NAVIGATION ============
function navigate(page, data) {
  currentPage = page;
  editingId = data || null;
  document.querySelectorAll('.sidebar-link').forEach(el => {
    el.classList.remove('active');
    el.classList.add('text-slate-400');
    if(el.dataset.nav === page) { el.classList.add('active'); el.classList.remove('text-slate-400'); }
  });
  // Close mobile sidebar
  const s = document.getElementById('sidebar');
  if(!s.classList.contains('-translate-x-full') && window.innerWidth < 1024) toggleSidebar();

  const titles = { dashboard: window.elementSdk?.config?.dashboard_greeting || defaultConfig.dashboard_greeting, works:'Obras', clients:'Clientes', arts:'ARTs Emitidas', 'new-art':'Nova ART', 'edit-art':'Editar ART', reports:'Relatórios', 'view-art':'Detalhes da ART', 'new-client':'Novo Cliente', 'new-work':'Nova Obra' };
  document.getElementById('pageTitle').textContent = titles[page] || page;
  renderPage();
}

function renderPage() {
  const c = document.getElementById('pageContent');
  c.className = 'p-4 lg:p-6 fade-in';
  switch(currentPage) {
    case 'dashboard': c.innerHTML = renderDashboard(); break;
    case 'works': c.innerHTML = renderWorksList(); break;
    case 'clients': c.innerHTML = renderClientsList(); break;
    case 'arts': c.innerHTML = renderArtsList(); break;
    case 'new-art': case 'edit-art': c.innerHTML = renderArtForm(); break;
    case 'view-art': c.innerHTML = renderArtView(); break;
    case 'new-client': c.innerHTML = renderClientForm(); break;
    case 'new-work': c.innerHTML = renderWorkForm(); break;
    case 'reports': c.innerHTML = renderReports(); break;
    default: c.innerHTML = renderDashboard();
  }
  lucide.createIcons();
  updateNotifBadge();
}

function updateNotifBadge() {
  const pending = getArts().filter(a => a.art_status === 'pendente' || a.art_status === 'rascunho').length;
  const b = document.getElementById('notifBadge');
  if(pending > 0) { b.textContent = pending; b.classList.remove('hidden'); } else { b.classList.add('hidden'); }
}

// ============ DASHBOARD ============
function renderDashboard() {
  const arts = getArts(), clients = getClients(), works = getWorks();
  const emitidas = arts.filter(a=>a.art_status==='emitida').length;
  const pendentes = arts.filter(a=>a.art_status==='pendente'||a.art_status==='rascunho').length;
  const totalValue = arts.reduce((s,a)=>s+(a.contract_value||0),0);

  const recentArts = [...arts].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,5);

  return `
  <div class="space-y-6">
    <!-- Stats -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 lg:gap-4">
      ${statCard('file-text', 'ARTs Emitidas', emitidas, 'bg-emerald-500/10 text-emerald-400', 'border-emerald-500/20')}
      ${statCard('clock', 'Pendentes', pendentes, 'bg-yellow-500/10 text-yellow-400', 'border-yellow-500/20')}
      ${statCard('building-2', 'Obras Ativas', works.length, 'bg-blue-500/10 text-blue-400', 'border-blue-500/20')}
      ${statCard('users', 'Clientes', clients.length, 'bg-brand-500/10 text-brand-400', 'border-brand-500/20')}
    </div>

    <!-- Quick Actions -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
      <button onclick="navigate('new-art')" class="card-hover bg-gradient-to-br from-brand-500 to-brand-700 rounded-xl p-4 text-left text-white">
        <i data-lucide="plus-circle" class="w-6 h-6 mb-2"></i>
        <div class="font-semibold">Nova ART</div>
        <div class="text-xs text-brand-100 mt-1">Emitir anotação</div>
      </button>
      <button onclick="navigate('new-client')" class="card-hover bg-slate-800/50 border border-slate-700/50 rounded-xl p-4 text-left hover:border-brand-500/30">
        <i data-lucide="user-plus" class="w-6 h-6 mb-2 text-brand-400"></i>
        <div class="font-semibold text-white">Novo Cliente</div>
        <div class="text-xs text-slate-400 mt-1">Cadastrar cliente</div>
      </button>
      <button onclick="navigate('new-work')" class="card-hover bg-slate-800/50 border border-slate-700/50 rounded-xl p-4 text-left hover:border-brand-500/30">
        <i data-lucide="landmark" class="w-6 h-6 mb-2 text-brand-400"></i>
        <div class="font-semibold text-white">Nova Obra</div>
        <div class="text-xs text-slate-400 mt-1">Registrar obra</div>
      </button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <!-- Recent ARTs -->
      <div class="lg:col-span-2 bg-slate-900/50 border border-slate-800/50 rounded-xl">
        <div class="px-5 py-4 border-b border-slate-800/50 flex items-center justify-between">
          <h3 class="font-semibold text-white text-sm">ARTs Recentes</h3>
          <button onclick="navigate('arts')" class="text-xs text-brand-400 hover:text-brand-300">Ver todas →</button>
        </div>
        <div class="p-2">
          ${recentArts.length === 0 ? '<div class="text-center py-8 text-slate-500 text-sm">Nenhuma ART emitida ainda</div>' :
            recentArts.map(a => `
            <button onclick="navigate('view-art','${a.__backendId}')" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-800/50 text-left transition-colors">
              <div class="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center flex-shrink-0"><i data-lucide="file-text" class="w-4 h-4 text-brand-400"></i></div>
              <div class="flex-1 min-w-0">
                <div class="text-sm text-white font-medium truncate">${a.art_number || '-'} — ${a.work_name || 'Sem obra'}</div>
                <div class="text-xs text-slate-500">${a.client_name || '-'} · ${formatDate(a.created_at)}</div>
              </div>
              <span class="status-badge ${statusColor(a.art_status)}">${a.art_status || 'rascunho'}</span>
            </button>`).join('')}
        </div>
      </div>

      <!-- Summary -->
      <div class="bg-slate-900/50 border border-slate-800/50 rounded-xl p-5">
        <h3 class="font-semibold text-white text-sm mb-4">Resumo Financeiro</h3>
        <div class="space-y-4">
          <div>
            <div class="text-xs text-slate-500 mb-1">Valor Total em ARTs</div>
            <div class="text-2xl font-bold text-white font-display">${formatCurrency(totalValue)}</div>
          </div>
          <div class="h-px bg-slate-800"></div>
          <div class="space-y-2">
            <div class="flex justify-between text-sm"><span class="text-slate-400">Total ARTs</span><span class="text-white font-medium">${arts.length}</span></div>
            <div class="flex justify-between text-sm"><span class="text-slate-400">Emitidas</span><span class="text-emerald-400 font-medium">${emitidas}</span></div>
            <div class="flex justify-between text-sm"><span class="text-slate-400">Pendentes</span><span class="text-yellow-400 font-medium">${pendentes}</span></div>
          </div>
          <!-- Simple bar chart -->
          <div class="pt-2">
            <div class="text-xs text-slate-500 mb-2">Distribuição</div>
            <div class="space-y-1.5">
              ${['emitida','pendente','rascunho','cancelada'].map(s => {
                const count = arts.filter(a=>a.art_status===s).length;
                const pct = arts.length ? Math.round(count/arts.length*100) : 0;
                const colors = {emitida:'bg-emerald-500',pendente:'bg-blue-500',rascunho:'bg-yellow-500',cancelada:'bg-red-500'};
                return `<div><div class="flex justify-between text-[11px] mb-0.5"><span class="text-slate-400 capitalize">${s}</span><span class="text-slate-500">${count}</span></div><div class="h-1.5 bg-slate-800 rounded-full overflow-hidden"><div class="${colors[s]} h-full rounded-full transition-all" style="width:${pct}%"></div></div></div>`;
              }).join('')}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function statCard(icon, label, value, iconBg, border) {
  return `<div class="bg-slate-900/50 border ${border} rounded-xl p-4 card-hover">
    <div class="flex items-center gap-3 mb-2"><div class="w-9 h-9 rounded-lg ${iconBg} flex items-center justify-center"><i data-lucide="${icon}" class="w-4 h-4"></i></div></div>
    <div class="text-2xl font-bold text-white">${value}</div>
    <div class="text-xs text-slate-500 mt-0.5">${label}</div>
  </div>`;
}

// ============ ARTS LIST ============
function renderArtsList() {
  const arts = [...getArts()].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  return `
  <div class="space-y-4">
    <div class="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
      <div class="flex gap-2 flex-wrap">
        <input id="artSearch" oninput="filterArts()" placeholder="Buscar ART..." class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm w-48 text-white placeholder-slate-500">
        <select id="artStatusFilter" onchange="filterArts()" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white">
          <option value="">Todos status</option>
          <option value="rascunho">Rascunho</option>
          <option value="pendente">Pendente</option>
          <option value="emitida">Emitida</option>
          <option value="cancelada">Cancelada</option>
        </select>
      </div>
      <button onclick="navigate('new-art')" class="bg-brand-500 hover:bg-brand-600 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition-colors"><i data-lucide="plus" class="w-4 h-4"></i> Nova ART</button>
    </div>
    <div id="artsListContainer" class="space-y-2">
      ${arts.length===0 ? emptyState('file-text','Nenhuma ART cadastrada','Clique em "Nova ART" para começar') :
        arts.map(a => artListItem(a)).join('')}
    </div>
  </div>`;
}

function artListItem(a) {
  return `<div class="bg-slate-900/50 border border-slate-800/50 rounded-xl p-4 card-hover flex flex-col sm:flex-row sm:items-center gap-3 justify-between">
    <div class="flex items-center gap-3 min-w-0">
      <div class="w-10 h-10 rounded-lg bg-slate-800 flex items-center justify-center flex-shrink-0"><i data-lucide="file-text" class="w-5 h-5 text-brand-400"></i></div>
      <div class="min-w-0">
        <div class="text-sm font-semibold text-white truncate">${a.art_number} — ${a.work_name || 'Sem obra'}</div>
        <div class="text-xs text-slate-500">${a.client_name || '-'} · ${a.service_desc ? a.service_desc.substring(0,50)+'...' : '-'} · ${formatDate(a.created_at)}</div>
      </div>
    </div>
    <div class="flex items-center gap-2 flex-shrink-0 ml-auto sm:ml-0">
      <span class="status-badge ${statusColor(a.art_status)}">${a.art_status}</span>
      <button onclick="navigate('view-art','${a.__backendId}')" class="p-2 rounded-lg hover:bg-slate-800 text-slate-400 transition-colors" title="Ver"><i data-lucide="eye" class="w-4 h-4"></i></button>
      <button onclick="duplicateArt('${a.__backendId}')" class="p-2 rounded-lg hover:bg-slate-800 text-slate-400 transition-colors" title="Duplicar"><i data-lucide="copy" class="w-4 h-4"></i></button>
      <button onclick="deleteRecord('${a.__backendId}','ART')" class="p-2 rounded-lg hover:bg-red-500/10 text-red-400 transition-colors" title="Excluir"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
    </div>
  </div>`;
}

function filterArts() {
  const q = (document.getElementById('artSearch')?.value||'').toLowerCase();
  const s = document.getElementById('artStatusFilter')?.value||'';
  let arts = [...getArts()].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  if(q) arts = arts.filter(a => (a.art_number||'').toLowerCase().includes(q) || (a.work_name||'').toLowerCase().includes(q) || (a.client_name||'').toLowerCase().includes(q));
  if(s) arts = arts.filter(a => a.art_status === s);
  const c = document.getElementById('artsListContainer');
  if(c) c.innerHTML = arts.length === 0 ? emptyState('search','Nenhum resultado','Tente outros termos de busca') : arts.map(a=>artListItem(a)).join('');
  lucide.createIcons();
}

// ============ ART FORM ============
function renderArtForm() {
  const art = editingId ? allData.find(r => r.__backendId === editingId) : null;
  const clients = getClients();
  const works = getWorks();
  const workTypes = ['Construção Residencial','Construção Comercial','Reforma','Ampliação','Demolição','Projeto Estrutural','Projeto Elétrico','Projeto Hidráulico','Laudo Técnico','Vistoria','Consultoria','Fiscalização','Outros'];

  return `
  <form onsubmit="saveArt(event)" class="max-w-3xl mx-auto space-y-6">
    <div class="bg-slate-900/50 border border-slate-800/50 rounded-xl p-5">
      <h3 class="text-white font-semibold mb-4 flex items-center gap-2"><i data-lucide="file-text" class="w-4 h-4 text-brand-400"></i> Dados da ART</h3>

async function saveArt(e) {
  e.preventDefault();
  const btn = document.getElementById('saveArtBtn');
  btn.disabled = true; btn.innerHTML = '<span class="animate-spin">⟳</span> Salvando...';

  const data = {
    type: 'art',
    art_number: document.getElementById('artNum').value,
    art_status: document.getElementById('artStatus').value,
    work_name: document.getElementById('workName').value,
    work_type: document.getElementById('workType').value,
    work_address: document.getElementById('workAddr').value,
    service_desc: document.getElementById('serviceDesc').value,
    start_date: document.getElementById('startDate').value,
    end_date: document.getElementById('endDate').value,
    contract_value: parseFloat(document.getElementById('contractVal').value) || 0,
    client_name: document.getElementById('clientName').value,
    responsible: document.getElementById('responsible').value,
    crea_number: document.getElementById('creaNum').value,
    company_name: document.getElementById('companyName').value,
    notes: document.getElementById('artNotes').value,
    created_at: editingId ? (allData.find(r=>r.__backendId===editingId)?.created_at || new Date().toISOString()) : new Date().toISOString(),
    name: '', document: '', address: '', city: '', state: '', phone: '', email: '', role: ''
  };

  let result;
  if(editingId) {
    const existing = allData.find(r=>r.__backendId===editingId);
    result = await window.dataSdk.update({...existing, ...data});
  } else {
    if(allData.length >= 999) { showToast('Limite de 999 registros atingido!','error'); btn.disabled=false; btn.innerHTML='<i data-lucide="save" class="w-4 h-4"></i> Salvar ART'; lucide.createIcons(); return; }
    result = await window.dataSdk.create(data);
  }
  btn.disabled = false;
  if(result.isOk) { showToast(editingId ? 'ART atualizada!' : 'ART salva com sucesso!'); navigate('arts'); }
  else { showToast('Erro ao salvar ART','error'); btn.innerHTML='<i data-lucide="save" class="w-4 h-4"></i> Salvar ART'; lucide.createIcons(); }
}

async function duplicateArt(id) {
  const art = allData.find(r => r.__backendId === id);
  if(!art) return;
  if(allData.length >= 999) { showToast('Limite de registros atingido!','error'); return; }
  const dup = {...art};
  delete dup.__backendId;
  dup.art_number = nextArtNumber();
  dup.art_status = 'rascunho';
  dup.created_at = new Date().toISOString();
  const result = await window.dataSdk.create(dup);
  if(result.isOk) showToast('ART duplicada como rascunho!');
  else showToast('Erro ao duplicar','error');
}

      <div><label for="wStart" class="block text-xs text-slate-400 mb-1">Início</label><input id="wStart" type="date" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white"></div>
      <div><label for="wEnd" class="block text-xs text-slate-400 mb-1">Término</label><input id="wEnd" type="date" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white"></div>
    </div>
    <div><label for="wVal" class="block text-xs text-slate-400 mb-1">Valor (R$)</label><input id="wVal" type="number" step="0.01" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white"></div>
    <div class="flex gap-3 justify-end pt-2">
      <button type="button" onclick="navigate('works')" class="px-4 py-2 rounded-lg text-sm text-slate-400 hover:bg-slate-800 transition-colors">Cancelar</button>
      <button type="submit" id="saveWorkBtn" class="bg-brand-500 hover:bg-brand-600 text-white px-5 py-2 rounded-lg text-sm font-medium transition-colors">Salvar</button>
    </div>
  </form>`;
}

async function saveWork(e) {
  e.preventDefault();
  const btn = document.getElementById('saveWorkBtn');
  btn.disabled = true; btn.textContent = 'Salvando...';
  if(allData.length >= 999) { showToast('Limite de registros atingido!','error'); btn.disabled=false; btn.textContent='Salvar'; return; }
  const result = await window.dataSdk.create({
    type:'work', work_name:document.getElementById('wName').value, work_type:document.getElementById('wType').value,
    work_address:document.getElementById('wAddr').value, start_date:document.getElementById('wStart').value,
    end_date:document.getElementById('wEnd').value, contract_value:parseFloat(document.getElementById('wVal').value)||0,
    name:'', document:'', address:'', city:'', state:'', phone:'', email:'',
    art_number:'', art_status:'', service_desc:'', responsible:'', client_name:'', company_name:'',
    created_at:new Date().toISOString(), notes:'', crea_number:'', role:''
  });
  btn.disabled = false; btn.textContent = 'Salvar';
  if(result.isOk) { showToast('Obra cadastrada!'); navigate('works'); }
  else showToast('Erro ao salvar','error');
}

// ============ REPORTS ============
function renderReports() {
  const arts = getArts(), clients = getClients(), works = getWorks();
  const byType = {};
  arts.forEach(a => { const t = a.work_type||'Outros'; byType[t]=(byType[t]||0)+1; });
  const totalVal = arts.reduce((s,a)=>s+(a.contract_value||0),0);
  const avgVal = arts.length ? totalVal/arts.length : 0;

  return `
  <div class="space-y-6">
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
      ${statCard('file-text','Total ARTs',arts.length,'bg-brand-500/10 text-brand-400','border-brand-500/20')}
      ${statCard('users','Total Clientes',clients.length,'bg-blue-500/10 text-blue-400','border-blue-500/20')}
      ${statCard('building-2','Total Obras',works.length,'bg-emerald-500/10 text-emerald-400','border-emerald-500/20')}
      ${statCard('dollar-sign','Valor Médio',formatCurrency(avgVal),'bg-yellow-500/10 text-yellow-400','border-yellow-500/20')}
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <div class="bg-slate-900/50 border border-slate-800/50 rounded-xl p-5">
        <h3 class="text-white font-semibold text-sm mb-4">ARTs por Tipo de Obra</h3>
        <div class="space-y-2">
          ${Object.entries(byType).sort((a,b)=>b[1]-a[1]).map(([t,c]) => {
            const pct = arts.length ? Math.round(c/arts.length*100) : 0;
            return `<div><div class="flex justify-between text-xs mb-1"><span class="text-slate-400">${t}</span><span class="text-white font-medium">${c} (${pct}%)</span></div><div class="h-2 bg-slate-800 rounded-full"><div class="h-full bg-brand-500 rounded-full" style="width:${pct}%"></div></div></div>`;
          }).join('')}
          ${Object.keys(byType).length===0?'<div class="text-center text-slate-500 text-sm py-4">Sem dados</div>':''}
        </div>
      </div>

      <div class="bg-slate-900/50 border border-slate-800/50 rounded-xl p-5">
        <h3 class="text-white font-semibold text-sm mb-4">ARTs por Status</h3>
        <div class="space-y-3">
          ${['emitida','pendente','rascunho','cancelada','arquivada'].map(s => {
            const c = arts.filter(a=>a.art_status===s).length;
            return `<div class="flex items-center gap-3"><span class="status-badge ${statusColor(s)} min-w-[80px] text-center">${s}</span><div class="flex-1 h-2 bg-slate-800 rounded-full"><div class="h-full bg-slate-600 rounded-full" style="width:${arts.length?Math.round(c/arts.length*100):0}%"></div></div><span class="text-xs text-white font-medium w-6 text-right">${c}</span></div>`;
          }).join('')}
        </div>
      </div>
    </div>

    <div class="bg-slate-900/50 border border-slate-800/50 rounded-xl p-5">
      <h3 class="text-white font-semibold text-sm mb-2">Valor Total em Contratos</h3>
      <div class="text-3xl font-display font-bold text-brand-400">${formatCurrency(totalVal)}</div>
    </div>
  </div>`;
}

// ============ DELETE ============
async function deleteRecord(id, label) {
  showConfirm(`Tem certeza que deseja excluir este registro de ${label}?`, async () => {
    const rec = allData.find(r => r.__backendId === id);
    if(!rec) return;
    const result = await window.dataSdk.delete(rec);
    if(result.isOk) showToast(`${label} excluído(a)!`);
    else showToast('Erro ao excluir','error');
  });
}

// ============ EMPTY STATE ============
function emptyState(icon, title, sub) {
  return `<div class="text-center py-12"><div class="w-14 h-14 mx-auto rounded-full bg-slate-800 flex items-center justify-center mb-3"><i data-lucide="${icon}" class="w-6 h-6 text-slate-500"></i></div><div class="text-sm text-slate-400 font-medium">${title}</div><div class="text-xs text-slate-600 mt-1">${sub}</div></div>`;
}

// ============ ELEMENT SDK ============
window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => {
    const cfg = {...defaultConfig, ...config};
    document.getElementById('sidebarTitle').textContent = cfg.app_title;
    document.getElementById('sidebarBrand').textContent = cfg.company_brand.toUpperCase();
    const pt = document.getElementById('pageTitle');
    if(currentPage === 'dashboard') pt.textContent = cfg.dashboard_greeting;

    document.body.style.backgroundColor = cfg.background_color;
    document.body.style.color = cfg.text_color;
    document.body.style.fontFamily = `${cfg.font_family}, DM Sans, sans-serif`;
    document.body.style.fontSize = cfg.font_size + 'px';

    document.querySelectorAll('.bg-brand-500, [class*="bg-brand-5"]').forEach(el => {
      if(el.tagName==='BUTTON'||el.classList.contains('bg-brand-500')) el.style.backgroundColor = cfg.primary_action_color;
    });
  },
  mapToCapabilities: (config) => {
    const cfg = {...defaultConfig, ...config};
    return {
      recolorables: [
        { get:()=>cfg.background_color, set:(v)=>{ config.background_color=v; window.elementSdk.setConfig({background_color:v}); }},
        { get:()=>cfg.surface_color, set:(v)=>{ config.surface_color=v; window.elementSdk.setConfig({surface_color:v}); }},
        { get:()=>cfg.text_color, set:(v)=>{ config.text_color=v; window.elementSdk.setConfig({text_color:v}); }},
        { get:()=>cfg.primary_action_color, set:(v)=>{ config.primary_action_color=v; window.elementSdk.setConfig({primary_action_color:v}); }},
        { get:()=>cfg.secondary_action_color, set:(v)=>{ config.secondary_action_color=v; window.elementSdk.setConfig({secondary_action_color:v}); }}
      ],
      borderables: [],
      fontEditable: { get:()=>cfg.font_family, set:(v)=>{ config.font_family=v; window.elementSdk.setConfig({font_family:v}); }},
      fontSizeable: { get:()=>cfg.font_size, set:(v)=>{ config.font_size=v; window.elementSdk.setConfig({font_size:v}); }}
    };
  },
  mapToEditPanelValues: (config) => {
    const cfg = {...defaultConfig, ...config};
    return new Map([
      ['app_title', cfg.app_title],
      ['company_brand', cfg.company_brand],
      ['dashboard_greeting', cfg.dashboard_greeting]
    ]);
  }
});

// ============ DATA SDK ============
(async () => {
  const result = await window.dataSdk.init({
    onDataChanged(data) {
      allData = data;
      renderPage();
    }
  });
  if(!result.isOk) console.error('Data SDK init failed');
})();

lucide.createIcons();
